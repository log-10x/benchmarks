# Verify-lossless variant: writes reconstructed `text` for EVERY event
# (no isEncoded filter) so we can diff the round-tripped reconstruction
# against the original input byte-for-byte.
tenx: run
runtimeName: $=TenXEnv.get("LOG10X_MCP_RUNTIME_NAME", "mcp-verify")

include:
  - apps/shared
  - run/modules/input/file
  - run/initialize/inputField
  - run/initialize/level
  - run/initialize/group
  - run/initialize/message
  - run/initialize/httpCode
  - run/initialize/lookup
  - run/initialize/custom
  - run/initialize/k8s
  - run/modules/output/event/file

inputFile:
  - name: mcpFileInput
    path: $=TenXEnv.get("LOG10X_MCP_INPUT_PATH")
    printProgress: false
    extractors: []
    sourcePattern: null

outputFile:

  - path: $=TenXEnv.get("LOG10X_MCP_OUTPUT_DIR") + "/templates.json"
    writeTemplates: true
    append: false

  - path: $=TenXEnv.get("LOG10X_MCP_OUTPUT_DIR") + "/encoded.log"
    fields:
      - encode()

  # Reconstructed text for EVERY event (no filter) — this is the
  # template+values decode. Diff vs original proves losslessness.
  - path: $=TenXEnv.get("LOG10X_MCP_OUTPUT_DIR") + "/reconstructed.log"
    filter: null
    fields:
      - text
